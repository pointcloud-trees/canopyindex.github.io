name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # nitro generates both .output/server/wrangler.json (the real config) and
        # .wrangler/deploy/config.json (a redirect pointer for this command). Running
        # plain `wrangler deploy` from .output/server directly finds both and refuses
        # to guess which one to use - `nitro deploy --prebuilt` resolves the redirect
        # correctly and must be run from the repo root, not from .output/server.
        run: npx nitro deploy --prebuilt
